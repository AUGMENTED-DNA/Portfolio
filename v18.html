<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAI Orbital</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    #orbital-window {
      position: relative; z-index: 1;
      --sz: min(90vw, 90vh);
      width: var(--sz); height: var(--sz);
      border-radius: 50%; overflow: hidden;
      background: #0a0c14;
      box-shadow: 0 0 0 1px rgba(59,91,219,0.18),
        0 0 48px rgba(59,91,219,0.22), 0 0 110px rgba(59,91,219,0.10),
        inset 0 0 60px rgba(0,0,0,0.6);
    }
    #c { display: block; width: 100%; height: 100%; cursor: grab; -webkit-app-region: no-drag; }
    #c.dragging { cursor: grabbing; }
    #win-controls {
      position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      opacity: 0; transition: opacity 0.2s; z-index: 20; -webkit-app-region: no-drag;
    }
    #orbital-window:hover #win-controls { opacity: 1; }
    .win-btn {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid rgba(138,180,248,0.4);
      background: rgba(10,10,20,0.88); color: rgba(138,180,248,0.85);
      font-size: 11px; font-weight: 600; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .win-btn:hover { background: rgba(59,91,219,0.65); color: #fff; }
    .win-sep { width: 1px; height: 14px; background: rgba(138,180,248,0.2); margin: 0 2px; }
    #tooltip {
      position: fixed; background: rgba(10,10,20,0.92); color: #8ab4f8;
      border: 1px solid rgba(138,180,248,0.35); border-radius: 6px;
      padding: 5px 11px; font-size: 12px; pointer-events: none;
      opacity: 0; transition: opacity 0.12s; white-space: nowrap; z-index: 10;
    }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="orbital-window">
    <div id="win-controls">
      <button class="win-btn" id="btn-size-s" title="Small (650)">S</button>
      <button class="win-btn" id="btn-size-m" title="Medium (900)">M</button>
      <button class="win-btn" id="btn-size-l" title="Large (1150)">L</button>
      <div class="win-sep"></div>
      <button class="win-btn" id="btn-minimize" title="Minimize">&#8722;</button>
      <button class="win-btn" id="btn-close"    title="Close">&#215;</button>
    </div>
    <canvas id="c"></canvas>
  </div>
  <div id="tooltip"></div>
  <script src="app.js"></script>
</body>
</html>
