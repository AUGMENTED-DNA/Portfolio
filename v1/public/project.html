<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details</title>
  <script>
    (function(){var t=localStorage.getItem('portfolio-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="app">

    <!-- Rich header -->
    <header class="app-header">
      <a href="index.html" class="hdr-logo-link">
        <svg class="logo-svg" width="24" height="24" viewBox="0 0 26 26" fill="none">
          <rect x="0"  y="0"  width="11" height="11" rx="1.5" fill="#1d4ed8"/>
          <rect x="15" y="0"  width="11" height="11" rx="1.5" fill="#2563eb"/>
          <rect x="0"  y="15" width="11" height="11" rx="1.5" fill="#2563eb"/>
          <rect x="15" y="15" width="11" height="11" rx="1.5" fill="#60a5fa"/>
        </svg>
        <div>
          <span class="hdr-logo-title">PORTFOLIO</span>
          <span class="hdr-logo-sub">&#8592; Back to projects</span>
        </div>
      </a>
      <span class="hdr-sep">/</span>
      <div class="hdr-proj">
        <span class="hdr-proj-name" id="projName">&#8212;</span>
        <span class="hdr-proj-ver" id="projVer" style="display:none"></span>
        <span class="hdr-proj-desc" id="projDesc"></span>
      </div>
      <div class="hdr-right">
        <div class="hdr-divider"></div>
        <div class="hdr-stats">
          <div class="hdr-stat"><span class="hdr-stat-n" id="statChangelog">0</span><span class="hdr-stat-l">CL</span></div>
          <div class="hdr-stat"><span class="hdr-stat-n" id="statBacklog">0</span><span class="hdr-stat-l">BL</span></div>
          <div class="hdr-stat"><span class="hdr-stat-n" id="statObjectives">0</span><span class="hdr-stat-l">OBJ</span></div>
        </div>
        <div class="hdr-divider"></div>
        <a class="hbtn-gh" id="ghLink" href="#" target="_blank" style="display:none">&#8599; GH</a>
        <button id="themeToggle" class="hbtn-ghost">THEME</button>
      </div>
    </header>

    <!-- Tabs -->
    <div class="pj-tabs-bar">
      <button class="pj-tab-btn active" data-tab="info">INFO</button>
      <button class="pj-tab-btn" data-tab="objective">OBJECTIVE</button>
      <button class="pj-tab-btn" data-tab="changelog">CHANGELOG</button>
      <button class="pj-tab-btn" data-tab="backlog">BACKLOG</button>
    </div>

    <!-- Content -->
    <main class="pj-content">
      <div id="tab-info"      class="pj-tab active"></div>
      <div id="tab-objective" class="pj-tab"></div>
      <div id="tab-changelog" class="pj-tab"></div>
      <div id="tab-backlog"   class="pj-tab">
        <!-- Add Form -->
        <div class="pj-add-form">
          <div class="pj-form-row">
            <label>Title</label>
            <input type="text" id="blTitle" placeholder="Short title for this item">
          </div>
          <div class="pj-form-row">
            <label>Summary</label>
            <input type="text" id="blSummary" placeholder="One-line synopsis">
          </div>
          <div class="pj-form-row">
            <label>Description</label>
            <textarea id="blDescription" rows="2" placeholder="Detailed description"></textarea>
          </div>
          <div class="pj-form-actions">
            <button id="addBacklogBtn" class="btn-primary">ADD</button>
            <button id="clearBacklogBtn" class="btn-secondary">CLEAR</button>
          </div>
        </div>
        <div id="backlogList"></div>
      </div>
    </main>
  </div>

  <!-- Floating tooltip -->
  <div id="tt" class="pj-tooltip" style="display:none">
    <div class="pj-tt-title" id="ttTitle"></div>
    <div class="pj-tt-body"  id="ttBody"></div>
    <div class="pj-tt-footer" id="ttFooter" style="display:none"></div>
  </div>

  <!-- Edit overlay -->
  <div id="editOverlay" class="edit-overlay hidden">
    <div class="edit-box">
      <div class="edit-box-header">
        <span>EDIT BACKLOG ITEM</span>
        <button id="editCancelBtn" class="btn-secondary">&#10005;</button>
      </div>
      <div class="form-row">
        <label>Title</label>
        <input type="text" id="editTitle" placeholder="Title">
      </div>
      <div class="form-row">
        <label>Summary</label>
        <input type="text" id="editSummary" placeholder="One-line synopsis">
      </div>
      <div class="form-row">
        <label>Description</label>
        <textarea id="editDescription" rows="3" placeholder="Detailed description"></textarea>
      </div>
      <div class="form-actions">
        <button id="editSaveBtn" class="btn-primary">SAVE</button>
        <button id="editCancelBtn2" class="btn-secondary">CANCEL</button>
      </div>
    </div>
  </div>

  <script src="project.js"></script>
</body>
</html>
